server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy API requests to the Express server ──────────────────────────────
    # "server" resolves to the server container via Docker's internal DNS.
    # This replaces the Vite dev proxy (which only works in local development).
    location /api/ {
        proxy_pass         http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Proxy uploaded files (QR code images) ────────────────────────────────
    location /uploads/ {
        proxy_pass       http://server:5000;
        proxy_set_header Host $host;
    }

    # ── React SPA — serve index.html for all client-side routes ──────────────
    # Without this, refreshing /verify/0xABCD or /dashboard would 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
